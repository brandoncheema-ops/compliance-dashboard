name: Deploy to VPS

on:
  push:
      branches: [main]

      jobs:
        deploy:
            runs-on: ubuntu-latest
                steps:
                      - uses: actions/checkout@v4

                            - name: Remove Render config
                                    run: |
                                              rm -f render.yaml render.json
                                                        rm -rf .render/

                                                              - name: Deploy to VPS
                                                                      uses: appleboy/ssh-action@v1.0.3
                                                                              with:
                                                                                        host: ${{ secrets.VPS_HOST }}
                                                                                                  username: root
                                                                                                            key: ${{ secrets.VPS_SSH_KEY }}
                                                                                                                      script: |
                                                                                                                                  mkdir -p /var/www/brandon.nfapps.ai
                                                                                                                                              cd /tmp
                                                                                                                                                          rm -rf compliance-dashboard
                                                                                                                                                                      git clone --depth 1 https://github.com/brandoncheema-ops/compliance-dashboard.git
                                                                                                                                                                                  rm -f compliance-dashboard/render.yaml compliance-dashboard/render.json
                                                                                                                                                                                              rm -rf compliance-dashboard/.render compliance-dashboard/.git
                                                                                                                                                                                                          rsync -av --delete --exclude='.git' compliance-dashboard/ /var/www/brandon.nfapps.ai/
                                                                                                                                                                                                                      rm -rf /tmp/compliance-dashboard
                                                                                                                                                                                                                                  echo "Deployed compliance-dashboard to root"
